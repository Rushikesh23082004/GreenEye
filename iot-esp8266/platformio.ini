[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200

; Libraries
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
    links2004/WebSockets@^2.3.6

; Build settings
build_flags = 
    -Wl,-Teagle.flash.4m3m.ld
    -D PIO_FRAMEWORK_ARDUINO_MMU_CACHE16_IRAM48_SECHEAP_NO_OVERLAP

; Upload settings
upload_speed = 921600

; Monitor settings
monitor_filters = 
    direct
    esp8266_exception_decoder